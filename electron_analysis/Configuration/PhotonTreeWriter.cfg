List = Preselection, TrdCuts, RTI, MC, BadRuns, BasicQuality, Trigger

[Preselection]
  Title = "Preselection"
  Cuts = IsNotInSolarArrayShadow, HasEcalShower, HasEcalShower3D
  Activate efficiency vs. time histograms for the whole selector
  SelectorAttachments = EfficiencyVsTimeHistograms

[RTI]
   Title = "RTI cuts"
   Cuts = RTIdataAvailable, \
   //  HighTrdOccupancyPeriod, \
     MostEventsTriggered, \
     SecondWithinRun, \
    // BadReconstructionPeriod, \
     BadFacingAngle, \
     NoMissedEvents, \
     BadLiveTime, \
     TooManyEventsInSecond, \
     NoHardwareErrors, \
    // GoodAlignment
[MC]
   Title = "MC cuts"
   Cuts = MCHasPrimaryEventGenerator, \
     MCEventHasNonZeroWeight, \
     MCAbsoluteRigidity(0.0|100000.0)
     CutAttachments = ValueHistograms, EfficiencyHistograms

[BadRuns]
   Title = "Bad runs"
   Cuts = BadRun(General), \
    BadRun(DAQ), \
    BadRun(TOF), \
    BadRun(ACC), \
    BadRun(Tracker), \
    BadRun(Rich), \
    BadRun(TRDD),\
    BadRun(Ecal)
  

//[BasicQuality]
 //  Title = "Basic quality cuts"
  // Cuts = HasTrdTrack 
 //  CutAttachments = ValueHistograms, EfficiencyHistograms
 //  SelectorAttachments = EfficiencyVsTimeHistograms

[Trigger]
   Title = "Trigger cuts"
   Cuts = TriggerInformationAvailable
   CutAttachments = ValueHistograms, EfficiencyHistograms
   SelectorAttachments = EfficiencyVsTimeHistograms


