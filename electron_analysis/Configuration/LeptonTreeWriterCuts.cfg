[EventSelectors]
    List = BadRuns,\
           RTI,\
           TrdCalibration,\
           McPreselection

[BadRuns]
    Title = "BadRuns"
    Cuts = BadRun(DAQ),\
           BadRun(TOF),\
           BadRun(Tracker),\
           BadRun(TRDD),\
           BadRun(Ecal)

[RTI]
    Title = "RTI"
    Cuts = RTIdataAvailable,\
           MostEventsTriggered,\
           SecondWithinRun,\
           BadReconstructionPeriod,\
           BadFacingAngle,\
           NoMissedEvents,\
           GoodAlignment,\
           TooManyEventsInSecond,\
           BadLiveTime,\
           NoHardwareErrors,\
           HighTrdOccupancyPeriod

[TrdCalibration]
    Title = "TrdCalibration"
    Cuts = TrdCalibrationAvailable

[McPreselection]
  Title = "McPreselection"
  Cuts = MCHasPrimaryEventGenerator,\
         MCEventHasNonZeroWeight

