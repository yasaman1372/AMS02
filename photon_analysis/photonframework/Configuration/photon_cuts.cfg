[EventSelectors]
  List = RTI, MC, BadRuns, BasicQuality, Trigger, OneTrack, TwoTracks, Preselection, EcalShower, McPairProduction, McHadronicPi0

[RTI]
  Title = "RTI cuts"
  Cuts = RTIdataAvailable, \
    HighTrdOccupancyPeriod, \    
    MostEventsTriggered, \
    SecondWithinRun, \
    BadReconstructionPeriod, \
    BadFacingAngle, \
    NoMissedEvents, \
    BadLiveTime, \
    TooManyEventsInSecond, \
    NoHardwareErrors, \
    GoodAlignment, \
    TrdCalibrationAvailable, \
    EventsWithL1Hit, \
    EventsWithL9Hit

[MC]
  Title = "MC cuts"
  Cuts = MCHasPrimaryEventGenerator, \
    MCEventHasNonZeroWeight
  CutAttachments = ValueHistograms, EfficiencyHistograms

[BadRuns]
  Title = "Bad runs"
  Cuts = BadRun(General), \
    BadRun(DAQ), \
    BadRun(TOF), \
    BadRun(ACC), \
    BadRun(Tracker), \
    BadRun(Rich), \
    BadRun(Ecal), \
    BadRun(TRDD), \
    BadRun(TRDC)

[BasicQuality]
  Title = "Basic quality cuts"
  Cuts = IsNotInSolarArrayShadow
  CutAttachments = ValueHistograms, EfficiencyHistograms
  SelectorAttachments = EfficiencyVsTimeHistograms

[Trigger]
  Title = "Trigger cuts"
  Cuts = TriggerInformationAvailable
  CutAttachments = ValueHistograms, EfficiencyHistograms
  SelectorAttachments = EfficiencyVsTimeHistograms

[OneTrack]
  Title = "At least one track"
  Cuts = TrackerNumberOfTracks(1|20)
  CutAttachments = ValueHistograms, EfficiencyHistograms
  SelectorAttachments = EfficiencyVsTimeHistograms

[TwoTracks]
  Title = "At least two tracks"
  Cuts = TrackerNumberOfTracks(2|20)
  CutAttachments = ValueHistograms, EfficiencyHistograms
  SelectorAttachments = EfficiencyVsTimeHistograms

[EcalShower]
  Title = "At least one ECAL shower"
  Cuts = EcalNumberOfShowersKXR(1|3)

[McPairProduction]
  Title = "MC particle undergoes pair production"
  Cuts = McPrimaryDoesPairProduction

[McHadronicPi0]
  Title = "MC particle undergoes hadronic interaction producing a Pi0"
  Cuts = McPrimaryDoesHadronicPi0
